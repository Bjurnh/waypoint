workflows:
  build_ios:
    name: Build iOS
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Fetch dependencies
        script: |
          flutter pub get
      - name: Build iOS IPA
        script: |
          flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
    
